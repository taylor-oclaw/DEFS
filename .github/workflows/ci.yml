name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('engine/**/Cargo.lock') }}
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('engine/**/Cargo.lock') }}
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: engine/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('engine/**/Cargo.lock') }}
    - name: Build
      run: cargo build --all --features std --verbose
    - name: Run tests
      run: cargo test --all --features std --verbose
    - name: Check formatting
      run: cargo fmt -p defs-core -p defs-cli -- --check
    - name: Run clippy
      run: cargo clippy --all --features std

  test-no-std:
    name: Test no_std
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    - name: Test no_std build
      run: cargo check -p defs-core --no-default-features --features alloc

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    - name: Run benchmarks
      run: cargo bench -- --test
